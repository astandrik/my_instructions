<rect x="0" y="0" width="1120" height="560" fill="#f8fafc"/>
<text x="40.0" y="56.0" class="title">Instruction eval overview</text>
<text x="40.0" y="84.0" class="subtitle">Read left to right: improvement, transfer, baseline context, and reference-prompt contrast.</text>
<rect x="40.0" y="122.0" width="248.0" height="150.0" rx="10.0" fill="#ffffff" stroke="#cbd5e1"/>
<rect x="64.0" y="146.0" width="38.0" height="8.0" rx="4.0" fill="#2563eb"/>
<text x="64.0" y="180.0" class="label">GPT improved</text>
<text x="64.0" y="214.0" class="value">42 -&gt; 49 hard gates</text>
<text x="64.0" y="242.0" class="small">quality 23/14/12, avg +14.4</text>
<rect x="310.0" y="122.0" width="248.0" height="150.0" rx="10.0" fill="#ffffff" stroke="#cbd5e1"/>
<rect x="334.0" y="146.0" width="38.0" height="8.0" rx="4.0" fill="#16a34a"/>
