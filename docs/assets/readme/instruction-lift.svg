<text x="604.0" y="180.0" class="label">No-instruction context</text>
<text x="604.0" y="214.0" class="value">current beats empty on 6/6 models</text>
<text x="604.0" y="242.0" class="small">hard-gate lift range +8..+29</text>
<rect x="850.0" y="122.0" width="248.0" height="150.0" rx="10.0" fill="#ffffff" stroke="#cbd5e1"/>
<rect x="874.0" y="146.0" width="38.0" height="8.0" rx="4.0" fill="#be123c"/>
