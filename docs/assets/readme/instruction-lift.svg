<text x="874.0" y="214.0" class="value">12/12 aggregate pairs</text>
<text x="874.0" y="242.0" class="small">current wins overall; cases still regress</text>
<rect x="40.0" y="304.0" width="1040.0" height="150.0" rx="10.0" fill="#ffffff" stroke="#cbd5e1"/>
<text x="72.0" y="342.0" class="label">Bottom line</text>
<text x="72.0" y="374.0" class="value">GPT is the cleanest win: 49/49 hard gates and +14.4 average quality delta versus previous current.</text>
<text x="72.0" y="402.0" class="value">GLM is the closest external model on our current instructions: 46/49 hard gates, 20/6/23 quality split vs GPT, avg -7.0.</text>
<text x="72.0" y="430.0" class="value">The remaining risk is case-level: references and older instructions still win specific no-op, architecture, dependency, and review cases.</text>
