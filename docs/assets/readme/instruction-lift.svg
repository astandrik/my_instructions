<text x="334.0" y="214.0" class="value">5/5 hard-gate lifts</text>
<text x="334.0" y="242.0" class="small">total lift +23; quality mixed</text>
<rect x="580.0" y="122.0" width="248.0" height="150.0" rx="10.0" fill="#ffffff" stroke="#cbd5e1"/>
